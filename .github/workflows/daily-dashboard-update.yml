name: Daily Dashboard Update

on:
  schedule:
    # Refresh dashboard data every day at 14:00 UTC.
    - cron: '0 14 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - dashboard.html
      - data/latest.json
      - data/history.json
      - scripts/fetch_listings.py
      - .github/workflows/daily-dashboard-update.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard-pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh dashboard data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/fetch_listings.py

      - name: Commit refreshed data when changed
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh dashboard data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site for Pages
        run: |
          mkdir -p site/data
          cp dashboard.html site/index.html
          cp data/latest.json site/data/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
