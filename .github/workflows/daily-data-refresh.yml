name: Daily Puerto Vallarta Data Refresh

on:
  schedule:
    - cron: '15 11 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Refresh dataset
        run: python3 scripts/fetch_listings.py
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "chore: daily Puerto Vallarta data refresh"
          git push
